<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gallery • The Bob SMP</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="shortcut icon" type="image/png" href="assets/favicon.png">

    <style>
        /* Smooth hover zoom */
        .gallery-item img {
            transition: transform 0.25s ease, opacity 0.25s ease;
            cursor: pointer;
        }
        .gallery-item img:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        /* Lightbox overlay */
        #lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
<header>
    <nav class="navbar">
        <div class="nav-brand">THE BOB SMP</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="rules.html">Rules</a>
            <a href="staff.html">Staff</a>
            <a href="join.html">Join</a>
            <a href="gallery.html" class="active">Gallery</a>
            <a href="vote.html">Vote</a>
            <a href="status.html">Status</a>
        </div>
    </nav>
</header>

<div class="main-wrapper">
    <div class="site-header">
        <h1 class="site-title">Gallery</h1>
        <p class="site-tagline">The official home of The Bob SMP</p>
    </div>

    <div class="card">
        <h2>Community builds & screenshots</h2>
        <p>These are the latest screenshots uploaded to the server gallery.</p>
    </div>

    <!-- Auto-generated gallery -->
    <div class="card gallery-grid" id="gallery"></div>
</div>

<!-- Lightbox -->
<div id="lightbox">
    <img id="lightbox-img" src="">
</div>

<footer class="footer">
    &copy; <span id="year"></span> The Bob SMP. All rights reserved.
</footer>

<script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // GitHub repo info
    const username = "finlay"; // If your GitHub username is different, change this
    const repo = "thebobsmp-website";
    const folderPath = "assets/images";

    const gallery = document.getElementById("gallery");

    // Fetch list of images from GitHub API
    fetch(`https://api.github.com/repos/${username}/${repo}/contents/${folderPath}`)
        .then(response => response.json())
        .then(files => {
            files
                .filter(file => file.type === "file" && /\.(png|jpe?g|gif|webp)$/i.test(file.name))
                .forEach(file => {
                    const item = document.createElement("div");
                    item.className = "gallery-item";

                    const img = document.createElement("img");
                    img.src = file.download_url;
                    img.alt = file.name;
                    img.loading = "lazy"; // Lazy loading
                    img.style = "width:100%;height:100%;object-fit:cover;border-radius:8px;";

                    // Lightbox click
                    img.addEventListener("click", () => {
                        document.getElementById("lightbox-img").src = file.download_url;
                        document.getElementById("lightbox").style.display = "flex";
                    });

                    item.appendChild(img);
                    gallery.appendChild(item);
                });
        })
        .catch(err => {
            console.error("Error loading images:", err);
            gallery.innerHTML = "<p>Failed to load gallery images.</p>";
        });

    // Close lightbox on click
    document.getElementById("lightbox").addEventListener("click", () => {
        document.getElementById("lightbox").style.display = "none";
    });
</script>

</body>
</html>
