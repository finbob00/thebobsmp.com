<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gallery • The Bob SMP</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="shortcut icon" type="image/png" href="assets/favicon.png">

    <style>
        .gallery-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .gallery-item img {
            transition: transform 0.25s ease, opacity 0.25s ease;
            cursor: pointer;
            border-radius: 8px;
        }

        .gallery-item img:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .caption {
            text-align: center;
            font-size: 0.9rem;
            margin-top: 6px;
            opacity: 0.8;
        }

        #lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
<header>
    <nav class="navbar">
        <div class="nav-brand">THE BOB SMP</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="rules.html">Rules</a>
            <a href="staff.html">Staff</a>
            <a href="join.html">Join</a>
            <a href="gallery.html" class="active">Gallery</a>
            <a href="vote.html">Vote</a>
            <a href="status.html">Status</a>
        </div>
    </nav>
</header>

<div class="main-wrapper">
    <div class="site-header">
        <h1 class="site-title">Gallery</h1>
        <p class="site-tagline">The official home of The Bob SMP</p>
    </div>

    <div class="card">
        <h2>Community builds & screenshots</h2>
        <p>These are the latest screenshots uploaded to the server gallery.</p>
    </div>

    <div class="card gallery-grid" id="gallery"></div>
</div>

<div id="lightbox">
    <img id="lightbox-img" src="">
</div>

<footer class="footer">
    &copy; <span id="year"></span> The Bob SMP. All rights reserved.
</footer>

<script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const username = "finbob00";
    const repo = "thebobsmp-website";
    const folder = "assets/images/";

    const gallery = document.getElementById("gallery");

    // Fetch the entire repo tree (raw method)
    fetch(`https://api.github.com/repos/${username}/${repo}/git/trees/main?recursive=1`)
        .then(res => res.json())
        .then(data => {
            const files = data.tree
                .filter(item =>
                    item.path.startsWith(folder) &&
                    item.type === "blob" &&
                    /\.(png|jpe?g|gif|webp)$/i.test(item.path)
                );

            if (files.length === 0) {
                gallery.innerHTML = "<p>No images found in gallery.</p>";
                return;
            }

            files.forEach(file => {
                const rawUrl = `https://raw.githubusercontent.com/${username}/${repo}/main/${file.path}`;

                const item = document.createElement("div");
                item.className = "gallery-item";

                const img = document.createElement("img");
                img.src = rawUrl;
                img.alt = file.path.split("/").pop();
                img.loading = "lazy";
                img.style = "width:100%;height:100%;object-fit:cover;";

                // Generate caption from filename
                let caption = file.path.split("/").pop(); // filename only
                caption = caption.replace(/\.[^/.]+$/, ""); // remove extension
                caption = caption.replace(/[-_]/g, " "); // replace - and _
                caption = caption.replace(/\b\w/g, c => c.toUpperCase()); // capitalise words

                const captionEl = document.createElement("div");
                captionEl.className = "caption";
                captionEl.textContent = caption;

                // Lightbox click
                img.addEventListener("click", () => {
                    document.getElementById("lightbox-img").src = rawUrl;
                    document.getElementById("lightbox").style.display = "flex";
                });

                item.appendChild(img);
                item.appendChild(captionEl);
                gallery.appendChild(item);
            });
        })
        .catch(err => {
            console.error(err);
            gallery.innerHTML = "<p>Failed to load gallery images.</p>";
        });

    document.getElementById("lightbox").addEventListener("click", () => {
        document.getElementById("lightbox").style.display = "none";
    });
</script>

</body>
</html>
